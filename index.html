<title>医信期末复习答题系统</title>
<style>
:root{--g:#007a3d;--deep:#005b2f;--mint:#effaf4;--bg:#f4f7f6;--ok:#10b981;--er:#f43f5e;--warn:#d97706;--c1:#1e293b;--c2:#64748b;--ln:#e2e8f0;--blue:#2563eb;--teal:#0f766e;--amber:#b45309}
*{box-sizing:border-box;outline:none}body{margin:0;min-height:100vh;display:flex;justify-content:center;background:linear-gradient(180deg,#f7fbf9 0%,#eef5f1 100%);color:var(--c1);font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif}.app{width:95%;max-width:1120px;margin:28px auto;min-height:88vh;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);display:flex;flex-direction:column;border-radius:20px;overflow:hidden;box-shadow:0 22px 54px rgba(15,23,42,.12)}header{min-height:82px;padding:22px 36px;background:var(--g);color:#fff;display:flex;justify-content:space-between;align-items:center;gap:20px}.top-title{font-size:23px;font-weight:900;line-height:1.25}.top-sub{font-size:13px;opacity:.9;margin-top:4px}#u-tag{font-size:15px;font-weight:900;white-space:nowrap}nav{display:none;background:rgba(255,255,255,.92);border-bottom:1px solid var(--ln);padding:0 30px;gap:10px;overflow-x:auto}.nav-btn{height:54px;padding:0 18px;border:0;border-bottom:4px solid transparent;background:none;color:var(--c2);font-size:16px;font-weight:900;cursor:pointer;white-space:nowrap}.nav-btn.active{color:var(--g);border-bottom-color:var(--g)}main{padding:34px;flex:1}.page{display:none}.page.active{display:block}.hero{display:grid;grid-template-columns:minmax(0,1.15fr) 360px;gap:26px;align-items:start}.intro h1{margin:0 0 12px;color:var(--g);font-size:34px;line-height:1.2}.intro p{margin:0 0 18px;color:var(--c2);line-height:1.8;font-weight:700}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:22px}.stat{border:1px solid var(--ln);border-radius:12px;background:#fff;padding:16px}.stat b{display:block;color:var(--g);font-size:24px;margin-bottom:6px}.stat span{color:var(--c2);font-size:13px;font-weight:800}.login-panel{border:1px solid rgba(0,122,61,.2);border-radius:14px;background:linear-gradient(135deg,#fbfefd,var(--mint));padding:24px}.login-panel h2{margin:0 0 18px;color:var(--g)}input{height:48px;width:100%;padding:0 14px;border:1px solid #d8dee6;border-radius:10px;background:#fff;color:var(--c1);font-size:16px}.btn{min-height:48px;padding:0 24px;border:0;border-radius:9px;background:var(--g);color:#fff;display:inline-flex;align-items:center;justify-content:center;line-height:1;text-align:center;font-size:16px;font-weight:900;cursor:pointer;margin-left:8px}.btn:hover{background:var(--deep)}.btn.soft{background:#64748b}.btn.light{background:#fff;color:var(--g);border:1px solid rgba(0,122,61,.24)}.btn.warn{background:#d97706}.login-panel .btn{width:100%;margin:14px 0 0}.prep-layout{display:grid;grid-template-columns:1fr 300px;gap:24px}.box{padding:24px;border:1px solid var(--ln);border-radius:14px;background:#fff}.box h3{margin:0 0 16px;color:var(--g)}.chips,.modes{display:flex;flex-wrap:wrap;gap:10px}.chip{min-height:38px;padding:0 14px;border:1px solid var(--ln);border-radius:9px;background:#fff;color:var(--c2);font-weight:900;cursor:pointer}.chip.active{border-color:var(--g);background:var(--mint);color:var(--g)}.modes{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px}.mode-card{padding:16px;border:2px solid var(--ln);border-radius:12px;background:#fff;cursor:pointer}.mode-card.active{border-color:var(--g);background:var(--mint)}.mode-card h4{margin:0 0 8px;color:var(--g)}.mode-card p{margin:0;color:var(--c2);font-size:13px;line-height:1.6}.side-metric{display:grid;grid-template-columns:1fr 1fr;gap:10px}.metric{border-radius:11px;background:#f8fafc;border:1px solid var(--ln);padding:14px}.metric b{display:block;color:var(--g);font-size:22px}.metric span{font-size:12px;color:var(--c2);font-weight:800}.quiz-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.tags{display:flex;flex-wrap:wrap;gap:8px}.tag{display:inline-flex;align-items:center;min-height:28px;padding:4px 10px;border-radius:7px;background:var(--g);color:#fff;font-size:12px;font-weight:900}.tag.course-mm{background:var(--blue)}.tag.course-os{background:var(--teal)}.tag.course-tcm{background:var(--amber)}.tag.src{background:#0f766e}.tag.type{background:#334155}.meta{color:var(--c2);font-weight:800}.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:18px 0 24px;flex-wrap:wrap}.actions{display:flex;gap:10px;flex-wrap:wrap}.progress{display:none;padding:16px;margin-bottom:22px;border:1px solid rgba(0,122,61,.16);border-radius:14px;background:linear-gradient(135deg,#fbfefd,var(--mint))}.phead{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px;color:var(--g);font-weight:900}.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:8px}.pitem{height:40px;border-radius:9px;border:1px solid #cbd5e1;background:#fff;color:var(--c2);cursor:pointer;font-weight:900}.pitem.current{border-color:var(--g);background:var(--g);color:#fff}.pitem.done{border-color:var(--ok);background:#ecfdf5;color:#047857}.pitem.wrong{border-color:var(--er);background:#fff1f2;color:#be123c}.qtext{margin:6px 0 24px;color:var(--g);font-size:23px;font-weight:900;line-height:1.65;word-break:break-word}.opts{display:grid;grid-template-columns:1fr 1fr;gap:16px}.opt{min-height:72px;padding:18px;border:2px solid var(--ln);border-radius:12px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:14px;line-height:1.55}.opt:hover{border-color:rgba(0,122,61,.38)}.idx{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;background:var(--mint);color:var(--g);font-weight:900}.opt.sel{border-color:var(--g);background:var(--mint)}.opt.correct{border-color:var(--ok)!important;background:#ecfdf5!important}.opt.wrong{border-color:var(--er)!important;background:#fff1f2!important}.ana{margin:20px 0 0;padding:18px 20px;border-left:6px solid var(--g);border-radius:12px;background:linear-gradient(135deg,#fbfefd,var(--mint));line-height:1.75}.multi-submit,.fill-submit{display:none;margin:18px auto 0;min-width:142px;height:50px;padding:0 30px;align-items:center;justify-content:center;line-height:1}.fill-box{display:none;border:1px solid var(--ln);border-radius:14px;background:#fff;padding:18px}.fill-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.fill-item{display:flex;align-items:center;gap:12px;min-width:0}.fill-item label{width:74px;flex:0 0 74px;color:var(--g);font-weight:900;white-space:nowrap;text-align:right}.fill-item input{height:44px;min-width:0;flex:1}.fill-state{margin-top:12px;display:grid;gap:8px}.fill-row{padding:10px 12px;border-radius:9px;background:#f8fafc;border:1px solid var(--ln);line-height:1.6}.fill-row.ok{border-color:var(--ok);background:#ecfdf5}.fill-row.bad{border-color:var(--er);background:#fff1f2}.snap-item{padding:24px 0;border-bottom:1px solid var(--ln)}.item{position:relative;margin-bottom:10px;padding:15px 110px 15px 16px;border:1px solid var(--ln);border-radius:12px;background:#fff;cursor:pointer;line-height:1.6}.item b{color:var(--g)}.del{position:absolute;top:14px;right:14px;min-height:28px;padding:2px 9px;border-radius:6px;border:1px solid var(--er);background:#fff;color:var(--er);cursor:pointer;font-size:12px;font-weight:900}.cat{display:flex;justify-content:space-between;gap:10px;margin:22px 0 10px;padding:11px 14px;border-left:5px solid var(--g);border-radius:8px;background:#f8fafc;color:var(--g);font-weight:900}.hist-tools{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}.chart{display:none;padding:18px;margin-bottom:20px;border:1px solid var(--ln);border-radius:14px;background:#fff}.chart svg{width:100%;height:260px;display:block}.axis{stroke:#cbd5e1;stroke-width:1}.line{fill:none;stroke:var(--g);stroke-width:3}.dot{fill:#fff;stroke:var(--g);stroke-width:3}.lab{fill:var(--c2);font-size:12px}@media(max-width:840px){header{padding:18px 22px;min-height:72px}.top-title{font-size:20px}main{padding:24px}.hero,.prep-layout{grid-template-columns:1fr}.stats,.modes,.opts,.fill-grid{grid-template-columns:1fr}.toolbar{align-items:stretch}.actions,.actions .btn{width:100%}.fill-item label{width:74px;flex-basis:74px}.item{padding-right:16px;padding-bottom:48px}.del{top:auto;bottom:12px}}

#page-login.active{display:flex;align-items:center;justify-content:center;min-height:calc(88vh - 150px)}
.home-screen{width:100%;max-width:900px;margin:0 auto;text-align:center;display:grid;gap:24px}
.home-title h1{margin:0;color:var(--g);font-size:40px;line-height:1.2;font-weight:900}
.home-subjects{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
.home-course{min-height:112px;border:2px solid var(--ln);border-radius:12px;background:#fff;color:var(--c1);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:14px;box-shadow:0 10px 24px rgba(15,23,42,.05)}
.home-course b{font-size:20px;color:var(--g);line-height:1.2}.home-course span{font-size:13px;color:var(--c2);font-weight:900}
.home-course.active{border-color:var(--g);background:linear-gradient(135deg,#fbfefd,var(--mint));box-shadow:0 14px 30px rgba(0,122,61,.14)}
.start-panel{width:100%;max-width:430px;margin:0 auto;padding:22px;border:1px solid rgba(0,122,61,.22);border-radius:14px;background:#fff}
.start-panel input{height:54px;text-align:center;font-size:18px}.start-panel .btn{width:100%;height:64px;margin:14px 0 0;border-radius:12px;font-size:24px}
#tag-container{display:none!important}.quiz-head{justify-content:flex-end}
@media(max-width:840px){.home-title h1{font-size:30px}.home-subjects{grid-template-columns:1fr 1fr}.start-panel .btn{font-size:21px}}
@media(max-width:520px){.home-subjects{grid-template-columns:1fr}.home-course{min-height:92px}}

</style>
</head>
<body>
<div class="app">
<header><div><div class="top-title">医信期末复习答题系统</div><div class="top-sub">多媒体技术 · 操作系统 · 中医工程学导论</div></div><div id="u-tag"></div></header>
<nav id="main-nav"><button id="nav-login" class="nav-btn" onclick="goHome()">科目选择</button><button id="nav-prepare" class="nav-btn active" onclick="goPrepare('normal')">练习中心</button><button id="nav-history" class="nav-btn" onclick="switchPage('history')">历史记录</button><button id="nav-wrong" class="nav-btn" onclick="switchPage('wrong')">错题回顾</button></nav>
<main>
<div id="page-login" class="page active"><section class="home-screen"><div class="home-title"><h1>医信期末复习答题系统</h1></div><div id="home-subjects" class="home-subjects"></div><div class="start-panel"><input id="user-input" placeholder="输入昵称"><button class="btn" onclick="doLogin()">进入练习中心</button></div></section></div>
<div id="page-prepare" class="page"><div class="prep-layout"><section class="box"><h3>练习范围</h3><div class="chips" id="course-chips"></div><h3 style="margin-top:24px">练习模式</h3><div id="mode-selector" class="modes"><div class="mode-card active" onclick="selectInitialMode('standard')"><h4>标准模式</h4><p>按课程和题号顺序练习</p></div><div class="mode-card" onclick="selectInitialMode('random')"><h4>随机模式</h4><p>打乱顺序，适合考前自测</p></div><div class="mode-card" onclick="selectInitialMode('hard')"><h4>重点模式</h4><p>集中练多空和较难题</p></div></div><div id="hard-config" style="display:none;margin-top:18px">数量：<input type="number" id="hard-num" min="5" value="30" style="width:92px"></div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:24px"><button class="btn" style="width:220px;margin:0" onclick="realStart()">开始挑战</button><button class="btn light" style="margin:0" onclick="goHome()">返回科目选择</button></div></section><aside class="box"><h3>当前题量</h3><div class="side-metric"><div class="metric"><b id="prep-count">-</b><span>总题数</span></div><div class="metric"><b id="prep-mode-name">-</b><span>模式</span></div><div class="metric"><b id="prep-choice-count">-</b><span>选择题</span></div><div class="metric"><b id="prep-fill-count">-</b><span>填空题</span></div></div></aside></div></div>
<div id="page-quiz" class="page"><div class="quiz-head"><div id="tag-container" class="tags"></div><div id="q-meta-idx" class="meta"></div></div><div class="toolbar"><div class="actions"><button class="btn light" onclick="goHome()">返回科目选择</button><button class="btn light" onclick="toggleProgressPanel()">查看作答情况</button></div><div class="actions"><button class="btn soft" onclick="submitPaper()">提交试卷</button><button class="btn" onclick="nextQ()">下一题 (Enter)</button></div></div><div id="progress-panel" class="progress"></div><div id="q-text" class="qtext"></div><div id="opt-box" class="opts"></div><button id="multi-submit" class="btn multi-submit" onclick="submitMulti()">提交本题</button><div id="fill-box" class="fill-box"><div id="fill-grid" class="fill-grid"></div><button id="fill-submit" class="btn fill-submit" onclick="submitFill()">提交本题</button><div id="fill-state" class="fill-state"></div></div><div id="ana-area" style="display:none"><div class="ana" id="ana-cont"></div></div></div>
<div id="page-result" class="page" style="text-align:center"><h1 id="res-score" style="font-size:96px;color:var(--g);margin:18px 0">0</h1><button class="btn" onclick="showSnap(null,true)">查看作答详情</button><button class="btn soft" onclick="goPrepare('normal')">返回中心</button><button class="btn light" onclick="goHome()">返回科目选择</button></div>
<div id="page-snap" class="page"><div id="snap-list"></div><div style="margin-top:30px;padding-bottom:40px;text-align:center"><button class="btn" id="snap-back-btn" onclick="switchPage('history')">返回列表</button><button class="btn soft" onclick="goPrepare('normal')">返回中心</button><button class="btn light" onclick="goHome()">返回科目选择</button></div></div>
<div id="page-history" class="page"><div class="hist-tools"><h2 style="color:var(--g);margin:0">历史记录</h2><button class="btn light" id="score-chart-btn" onclick="toggleScoreChart()" style="display:none">成绩曲线</button></div><div id="score-chart" class="chart"></div><div id="hist-list"></div></div>
<div id="page-wrong" class="page"><h2 style="color:var(--g);margin-top:0">错题回顾</h2><div class="toolbar"><div class="actions"><button class="btn" onclick="goPrepare('w_order')">顺序练错题</button><button class="btn soft" onclick="goPrepare('w_rand')">随机练错题</button><button class="btn warn" onclick="goPrepare('w_freq')">难点攻克</button></div></div><div id="w-content"></div></div>
</main>
</div>
<script>
const DB=[{"uid":"MM-001","origId":1,"course":"多媒体技术","src":"雨课堂原题","chap":"第二章 多媒体计算机系统","type":"m","diff":1,"q":"以下哪些属于显卡的主要型号？","a":["AMD RX7000系列","NVIDIA RTX40系列","Intel系列","Apple系列"],"c":[0,1,2],"answers":[],"p":"笔记中列出的显卡主要型号包括 AMD RX7000、NVIDIA RTX40 和 Intel。Apple 系列未作为主要型号列出。"},{"uid":"MM-002","origId":2,"course":"多媒体技术","src":"雨课堂原题","chap":"第二章 多媒体计算机系统","type":"s","diff":1,"q":"GPU在多媒体系统中的主要作用是？","a":["存储数据","处理图形渲染","控制输入设备","管理网络连接"],"c":[1],"answers":[],"p":"GPU 是图形处理器，是显卡的核心组件，主要承担图像处理和图形渲染任务。"},{"uid":"MM-003","origId":3,"course":"多媒体技术","src":"雨课堂原题","chap":"第二章 多媒体计算机系统","type":"s","diff":1,"q":"以下哪种接口常用于传输高清视频信号？","a":["USB","Ethernet","VGA","HDMI"],"c":[3],"answers":[],"p":"视频采集卡和相关设备中常见 HDMI 接口，用于传输高清音视频信号。"},{"uid":"MM-004","origId":4,"course":"多媒体技术","src":"雨课堂原题","chap":"第二章 多媒体计算机系统","type":"s","diff":2,"q":"下列有关显示器说法不正确的是？","a":["LCD和LED都属于液晶显示器","OLED属于液晶显示器","LCD和LED不同之处在于背光源不同","OLED显示屏无需背光源"],"c":[1],"answers":[],"p":"OLED 是自发光显示技术，不属于液晶显示器，也不需要背光源。"},{"uid":"MM-005","origId":5,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 信号","type":"s","diff":2,"q":"下列关于采样和量化的说法，正确的是？","a":["采样是对信号幅值的离散化，量化是对时间的离散化","采样是对信号在时间上的离散化，量化是对幅值的离散化","采样和量化都是对信号幅值的离散化","采样和量化都是对信号时间的离散化"],"c":[1],"answers":[],"p":"采样处理时间轴，量化处理幅值轴。"},{"uid":"MM-006","origId":6,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 信号","type":"s","diff":2,"q":"根据奈奎斯特采样定理，为了无失真地重建原始信号，采样频率必须至少是信号最高频率的多少倍？","a":["一倍","两倍","三倍","四倍"],"c":[1],"answers":[],"p":"奈奎斯特采样定理要求 fs >= 2fm。"},{"uid":"MM-007","origId":7,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 信号","type":"s","diff":2,"q":"傅里叶变换和小波变换都是信号处理中重要的时频分析工具。若关注全局频率特性，应使用哪一种；若需捕捉局部特征，应使用哪一种？","a":["傅里叶变换；小波变换","小波变换；傅里叶变换","DCT；PCA","ICA；HHT"],"c":[0],"answers":[],"p":"傅里叶变换更适合分析全局频率成分，小波变换强调局部特征和多分辨率分析。"},{"uid":"MM-008","origId":8,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 图像","type":"m","diff":1,"q":"以下关于图像量化的描述正确的是？","a":["1位量化表示黑白图像","8位/通道量化在RGB模式下可显示2^24种颜色","16位/通道量化每个通道有2^16个灰度等级","32位/通道量化每个通道有2^32个灰度等级"],"c":[0,1,2,3],"answers":[],"p":"量化位数决定像素可表示的灰度或颜色等级。"},{"uid":"MM-009","origId":9,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 图像","type":"s","diff":3,"q":"一幅广告牌图像的物理尺寸为76.2cm x 50.8cm，以200dpi采样并用24位真彩色量化。采样后的图像像素数与未压缩字节数分别为？","a":["6000 x 4000；24,000,000字节","3000 x 2000；18,000,000字节","6000 x 4000；72,000,000字节","7620 x 5080；116,128,800字节"],"c":[2],"answers":[],"p":"76.2cm=30英寸，50.8cm=20英寸，像素为6000x4000。24位真彩色每像素3字节，共72000000字节。"},{"uid":"MM-010","origId":10,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 图像","type":"s","diff":2,"q":"关于伪彩色与假彩色的定义，以下哪项正确？","a":["伪彩色是将多波段数据合成真彩色，假彩色是单通道数据颜色映射","伪彩色和假彩色均需使用可见光波段","伪彩色是将单通道数据映射为人工颜色，假彩色是将非自然波段组合生成颜色","伪彩色仅用于医学影像，假彩色仅用于遥感"],"c":[2],"answers":[],"p":"伪彩色强调单通道或灰度数据到颜色的人工映射；假彩色常将非可见光波段或重新组合波段映射为可见颜色。"},{"uid":"MM-011","origId":11,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 图像","type":"s","diff":2,"q":"以下哪种技术属于伪彩色处理的典型实现方式？","a":["将可见光红、绿、蓝波段直接合成真彩色图像","通过颜色查找表LUT将灰度CT图像映射为彩虹色系","将卫星近红外波段转换为红色通道以突出植被","使用Photoshop手动调整图像的色相和饱和度"],"c":[1],"answers":[],"p":"伪彩色处理常用 LUT 将灰度值替换为对应颜色。"},{"uid":"MM-012","origId":12,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 色彩","type":"s","diff":1,"q":"下列关于色彩三要素的描述，哪一项是正确的？","a":["色相是颜色的明亮程度","亮度是颜色的纯度","饱和度是颜色的纯度或深浅程度","色相是颜色的灰度"],"c":[2],"answers":[],"p":"色彩三要素为色相、亮度、饱和度。饱和度表示纯度或颜色深浅程度。"},{"uid":"MM-013","origId":13,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 色彩","type":"s","diff":1,"q":"以下关于光色三原色的描述，正确的是？","a":["光色三原色是红、黄、蓝","光色三原色是青、品红、黄色","光色三原色是红、绿、蓝","光色三原色是黑、白、灰"],"c":[2],"answers":[],"p":"光色三原色是 RGB，即红、绿、蓝。"},{"uid":"MM-014","origId":14,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 色彩","type":"s","diff":1,"q":"CMYK颜色模型中的M代表什么颜色？","a":["青色","洋红色","黄色","黑色"],"c":[1],"answers":[],"p":"CMYK 分别表示 Cyan、Magenta、Yellow、Key/Black。"},{"uid":"MM-015","origId":15,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 色彩","type":"s","diff":3,"q":"在 Photoshop 中创建一个 Lab 模式文档，并输入 L=50、a=100、b=0 的颜色值，显示器色彩空间设置为 sRGB。屏幕上实际显示的颜色通常是？","a":["仍然是 L=50、a=100、b=0 的红色，因为 Lab 色域较大","完全无法显示，屏幕区域变成灰色","显示为 sRGB 色域中最接近该 Lab 值的红色","自动将文档模式转换为 RGB，然后显示"],"c":[2],"answers":[],"p":"Lab 色域大于 sRGB。当颜色超出设备色域时，会映射为设备色域中最接近的颜色。"},{"uid":"MM-016","origId":16,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 色彩","type":"m","diff":2,"q":"关于YUV颜色模型，下列说法正确的是？","a":["Y信号分量构成的黑白灰度图与U、V色差信号相互独立","YUV分量之间的独立性使得黑白电视无法接收彩色电视信号","YUV表示法可以降低数字彩色图像的存储容量","人眼对彩色细节的分辨能力高于对亮度细节的分辨能力"],"c":[0,2],"answers":[],"p":"Y 表示亮度，U/V 表示色差信号。人眼对亮度更敏感，可对色度分量下采样以降低容量。"},{"uid":"MM-017","origId":17,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 色彩","type":"s","diff":1,"q":"下列哪种颜色模式表示比较符合人的视觉感受，可以更加直观地调整和控制颜色？","a":["RGB","CMYK","Lab","HSB"],"c":[3],"answers":[],"p":"HSB/HSV/HSL 以色相、饱和度、亮度等方式描述颜色，更符合直观调色习惯。"},{"uid":"MM-018","origId":18,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 数据压缩编码算法","type":"s","diff":3,"q":"某信源包含4个符号A、B、C、D，概率分别为0.5、0.125、0.125、0.25，其信息熵是多少？","a":["1.0 bit","1.5 bit","1.75 bit","2 bit"],"c":[2],"answers":[],"p":"H=-(0.5log2 0.5 + 0.125log2 0.125 + 0.125log2 0.125 + 0.25log2 0.25)=1.75 bit。"},{"uid":"MM-019","origId":19,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 数据压缩编码算法","type":"s","diff":2,"q":"哈夫曼编码的核心目标是？","a":["使编码长度尽可能相等","使平均编码长度尽可能短","使编码尽可能简单","使译码速度最快"],"c":[1],"answers":[],"p":"哈夫曼编码根据符号概率构造最优前缀码，使平均码长尽可能短。"},{"uid":"MM-020","origId":20,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 数据压缩编码算法","type":"s","diff":3,"q":"关于算术编码的基本原理，下列说法正确的是？","a":["算术编码将每个符号固定映射为整数二进制码","算术编码的编码长度一定小于信息熵","算术编码通过将整个字符序列映射到[0,1)内的一个子区间进行编码","算术编码的解码过程需要事先知道编码后的二进制位数"],"c":[2],"answers":[],"p":"算术编码把整段消息逐步映射到一个越来越小的概率区间。"},{"uid":"MM-021","origId":21,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 数据压缩编码算法","type":"s","diff":2,"q":"以下哪种变换编码方法是常用的？","a":["离散小波变换","K-L变换","离散余弦变换","以上都是"],"c":[3],"answers":[],"p":"常用变换编码方法包括 K-L 变换、DCT 和 DWT。"},{"uid":"MM-022","origId":22,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 数据压缩编码算法","type":"s","diff":2,"q":"以下哪种编码算法常用于有损压缩？","a":["行程编码","哈夫曼编码","变换编码","词典编码"],"c":[2],"answers":[],"p":"变换编码常与量化结合使用，量化会丢弃部分信息，常用于有损压缩。"},{"uid":"MM-023","origId":23,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 图像文件格式","type":"s","diff":2,"q":"在BMP文件的数据区中，像素的排列方式是？","a":["从上到下，从左到右","从下到上，从左到右","从上到下，从右到左","按随机顺序存储"],"c":[1],"answers":[],"p":"BMP 像素数据通常从底向上、从左到右存储。"},{"uid":"MM-024","origId":24,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 图像文件格式","type":"s","diff":2,"q":"对于24位真彩色BMP图像，位图文件头和位图信息头之后通常紧接着的是什么数据？","a":["调色板（颜色表）","保留字段","像素数据","图像结束标记"],"c":[2],"answers":[],"p":"BMP 的 BITMAPFILEHEADER 后面是 BITMAPINFOHEADER；对 24 位真彩色 BMP 来说，文件头和信息头之后通常不需要颜色表，紧接着就是像素数据。"},{"uid":"MM-025","origId":25,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 图像文件格式","type":"s","diff":2,"q":"已知一个256色（8位）BMP图像，文件头bfOffBits字段值为0x0436（十进制1078）。以下说法正确的是？","a":["颜色表有256项，每项4字节，占用1024字节","文件头之后立即开始像素数据","该BMP不存在颜色表","颜色表之后存在额外未知数据"],"c":[0],"answers":[],"p":"8 位 BMP 需要颜色表，2^8=256 项，每项4字节，共1024字节；14+40+1024=1078。"},{"uid":"MM-026","origId":26,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 图像文件格式","type":"s","diff":1,"q":"JPEG编码中，首先将RGB色彩空间转换为哪一种色彩空间，从而利用人眼视觉特性压缩？","a":["HSV","YUV","CMYK","Lab"],"c":[1],"answers":[],"p":"JPEG 常先进行 RGB 到 YUV 的转换。"},{"uid":"MM-027","origId":27,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 图像文件格式","type":"s","diff":1,"q":"以下哪种图像格式支持无损压缩且适合存储带有半透明背景的图形？","a":["JPEG","PNG","BMP","GIF"],"c":[1],"answers":[],"p":"PNG 支持无损压缩，也可存储 alpha 通道。"},{"uid":"MM-028","origId":28,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 图像文件格式","type":"s","diff":1,"q":"QR（Quick Response）码属于哪一类二维码？","a":["一维条码","矩阵式二维码","行排式二维码","三维条码"],"c":[1],"answers":[],"p":"QR 码是一种矩阵式二维码。"},{"uid":"MM-029","origId":29,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 图像文件格式","type":"s","diff":2,"q":"二维码编码中，哪种技术会让黑白模块分布更均匀，从而提升扫描成功率与识别速度？","a":["纠错","编码","掩膜（Mask）","填充"],"c":[2],"answers":[],"p":"掩膜用于改善二维码深色和浅色区域的分布。"},{"uid":"MM-030","origId":30,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 MPEG","type":"s","diff":2,"q":"在MPEG-1的帧内编码流程中，以下哪个步骤是为了将图像信息从空间域转换到频率域，从而将能量集中到少数低频系数上？","a":["分块处理（Blocking）","离散余弦变换（DCT）","量化（Quantization）","游程编码（RLE）"],"c":[1],"answers":[],"p":"DCT 将空间域数据变换到频域，使能量集中在低频系数。"},{"uid":"MM-031","origId":31,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 MPEG","type":"s","diff":2,"q":"MPEG视频压缩中，用于消除时间域冗余的核心技术是？","a":["离散余弦变换DCT","运动估计与运动补偿","哈夫曼编码","帧内预测编码"],"c":[1],"answers":[],"p":"帧间预测通过运动估计和运动补偿比较相邻帧，编码预测残差。"},{"uid":"MM-032","origId":32,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 MPEG","type":"m","diff":2,"q":"以下关于MPEG压缩技术的描述正确的是？","a":["MPEG通过时间冗余消除实现帧间预测","MPEG压缩算法使用离散余弦变换DCT进行变换编码","MPEG通过量化丢弃高频细节以减少数据量","MPEG压缩算法不涉及心理视觉优化"],"c":[0,1,2],"answers":[],"p":"MPEG 利用时间、空间和感知冗余，常使用预测、变换、量化和熵编码。"},{"uid":"MM-033","origId":33,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 MPEG","type":"s","diff":1,"q":"下列帧类型中，压缩率最高、数据量最小的是？","a":["I帧","P帧","B帧","完全一致"],"c":[2],"answers":[],"p":"B 帧利用前后帧进行双向预测，压缩率最高。"},{"uid":"MM-034","origId":34,"course":"多媒体技术","src":"雨课堂原题","chap":"第三章 MPEG","type":"s","diff":1,"q":"关于H.264标准的特点，下列说法正确的是？","a":["主要用于ISDN上的可视电话和视频会议","主要用于公共电话交换网络上的视频会议","具有高压缩效率和灵活的网络适应性","旨在以尽可能低的码率进行通信"],"c":[2],"answers":[],"p":"H.264 的关键词是灵活的网络适应性；H.261 对应 ISDN，H.263 对应 PSTN。"},{"uid":"MM-035","origId":35,"course":"多媒体技术","src":"笔记补充","chap":"第一章 多媒体技术基础","type":"s","diff":1,"q":"视觉媒体、听觉媒体等直接作用于人的感官的媒体属于哪一类？","a":["感觉媒体","表示媒体","存储媒体","传输媒体"],"c":[0],"answers":[],"p":"感觉媒体直接作用于人的感官。"},{"uid":"MM-036","origId":36,"course":"多媒体技术","src":"笔记补充","chap":"第一章 多媒体技术基础","type":"s","diff":1,"q":"为了传送感觉媒体而研究出来，并定义图像编码、声音编码等编码格式的媒体是？","a":["表现媒体","表示媒体","传输媒体","存储媒体"],"c":[1],"answers":[],"p":"表示媒体定义了感觉媒体的编码格式。"},{"uid":"MM-037","origId":37,"course":"多媒体技术","src":"笔记补充","chap":"第一章 多媒体技术基础","type":"s","diff":1,"q":"多媒体技术的三大特性是？","a":["实时性、共享性、海量性","集成性、多样性、交互性","压缩性、编码性、传输性","标准性、兼容性、安全性"],"c":[1],"answers":[],"p":"笔记明确列出多媒体技术三大特性：集成性、多样性、交互性。"},{"uid":"MM-038","origId":38,"course":"多媒体技术","src":"笔记补充","chap":"第一章 多媒体技术基础","type":"s","diff":1,"q":"世界上第一台真正的多媒体系统是？","a":["MPC1","Amiga","CD-I","AC97"],"c":[1],"answers":[],"p":"第一章笔记中写到世界上第一台真正的多媒体系统是 Amiga。"},{"uid":"MM-039","origId":39,"course":"多媒体技术","src":"笔记补充","chap":"第一章 多媒体技术基础","type":"m","diff":1,"q":"多媒体的关键技术包括哪些方面？","a":["多媒体数据的处理","多媒体数据的存储","多媒体数据的传输","输入/输出技术"],"c":[0,1,2,3],"answers":[],"p":"第一章列出的关键技术包括处理、存储、传输和输入/输出技术。"},{"uid":"MM-040","origId":40,"course":"多媒体技术","src":"笔记补充","chap":"第二章 多媒体计算机系统","type":"s","diff":1,"q":"麦克风在多媒体系统中的基本作用是？","a":["将声音信号转换为电信号","将电信号转换为光信号","将静态图像输入计算机","显示数字图像"],"c":[0],"answers":[],"p":"麦克风用于将声音信号转换为电信号。"},{"uid":"MM-041","origId":41,"course":"多媒体技术","src":"笔记补充","chap":"第二章 多媒体计算机系统","type":"s","diff":1,"q":"扫描仪的主要功能是？","a":["把静态图像扫描到计算机里","把声音信号转换为电信号","把视频信号输出到投影仪","把数字图像转换成纸张"],"c":[0],"answers":[],"p":"扫描仪用于将静态图像扫描输入到计算机中。"},{"uid":"MM-042","origId":42,"course":"多媒体技术","src":"笔记补充","chap":"第二章 多媒体计算机系统","type":"s","diff":1,"q":"数码相机将光学影像转换为电子数据时，常见流程是？","a":["光学影像-CCD/CMOS-模数转换-存储卡","光学影像-显卡-打印机-存储卡","声音信号-A/D转换-扬声器","像素数据-DCT-HDMI"],"c":[0],"answers":[],"p":"流程为光学影像经过 CCD/CMOS，再进行模数转换，最后存入存储卡。"},{"uid":"MM-043","origId":43,"course":"多媒体技术","src":"笔记补充","chap":"第二章 多媒体计算机系统","type":"m","diff":2,"q":"声卡的功能包括哪些？","a":["录制与播放声音文件","编辑与合成音乐文件","MIDI音乐合成","图像空间域到频域的变换"],"c":[0,1,2],"answers":[],"p":"声卡功能包括录制播放声音、编辑合成音乐、MIDI 合成。"},{"uid":"MM-044","origId":44,"course":"多媒体技术","src":"笔记补充","chap":"第二章 多媒体计算机系统","type":"s","diff":1,"q":"CD系列中，哪一种表示一次写入光盘？","a":["CD-ROM","CD-R","CD-RW","BD"],"c":[1],"answers":[],"p":"CD-R 是一次写入光盘。"},{"uid":"MM-045","origId":45,"course":"多媒体技术","src":"笔记补充","chap":"第三章 信号","type":"s","diff":2,"q":"采样频率fs与采样间隔Δt的关系是？","a":["fs=Δt","fs=1/Δt","fs=2Δt","fs与Δt无关"],"c":[1],"answers":[],"p":"采样频率与采样间隔互为倒数：fs=1/Δt。"},{"uid":"MM-046","origId":46,"course":"多媒体技术","src":"笔记补充","chap":"第三章 信号","type":"s","diff":2,"q":"当采样频率过低、无法复原原信号时，通常会造成什么现象？","a":["信号混叠","颜色失真","伪彩色增强","无损压缩"],"c":[0],"answers":[],"p":"采样频率过低会把高频信号误认为低频信号，造成混叠。"},{"uid":"MM-047","origId":47,"course":"多媒体技术","src":"笔记补充","chap":"第三章 信号","type":"s","diff":2,"q":"奈奎斯特频率fN与采样频率fs的关系是？","a":["fN=fs","fN=fs/2","fN=2fs","fN=1/fs"],"c":[1],"answers":[],"p":"奈奎斯特频率是采样频率的一半。"},{"uid":"MM-048","origId":48,"course":"多媒体技术","src":"笔记补充","chap":"第三章 信号","type":"s","diff":3,"q":"关于频率分辨率Δf，下列说法正确的是？","a":["Δf=1/T，T为采样记录总时长","Δf只由采样率决定","采样记录总时长越长，Δf越大","Δf与采样长度无关"],"c":[0],"answers":[],"p":"频率分辨率 Δf=1/T，其中 T 是采样记录总时长（时间窗长度）。T 越长，频谱间隔 Δf 越小，频率分辨率越细。"},{"uid":"MM-049","origId":49,"course":"多媒体技术","src":"笔记补充","chap":"第三章 图像","type":"s","diff":1,"q":"矢量图的主要特点是？","a":["由像素点组成，放大后一定失真","由计算机指令生成，任意缩放不变形","只能存储灰度图像","必须使用颜色表"],"c":[1],"answers":[],"p":"矢量图由图形指令和几何元素描述，缩放时不会像位图那样失真。"},{"uid":"MM-050","origId":50,"course":"多媒体技术","src":"笔记补充","chap":"第三章 图像","type":"s","diff":1,"q":"位图图像的基本单位是？","a":["像素","宏块","色相","码字"],"c":[0],"answers":[],"p":"像素是组成图像的基本单位。"},{"uid":"MM-051","origId":51,"course":"多媒体技术","src":"笔记补充","chap":"第三章 图像","type":"s","diff":2,"q":"DPI和PPI的区别描述正确的是？","a":["DPI主要用于屏幕，PPI主要用于打印","DPI管物理输出精度，PPI管电子屏幕清晰度","DPI与PPI完全相同","PPI表示每英寸墨点数"],"c":[1],"answers":[],"p":"PPI 管数字世界（屏幕），DPI 管物理世界（打印）。"},{"uid":"MM-052","origId":52,"course":"多媒体技术","src":"笔记补充","chap":"第三章 图像","type":"s","diff":1,"q":"24位真彩色表示什么含义？","a":["一个像素使用24个比特存储颜色信息","一张图像只有24个像素","每个通道有24字节","只能表示24种颜色"],"c":[0],"answers":[],"p":"24 位真彩色通常指 RGB 三通道每通道 8 位，共 24 位存储一个像素颜色。"},{"uid":"MM-053","origId":53,"course":"多媒体技术","src":"笔记补充","chap":"第三章 色彩","type":"s","diff":1,"q":"RGB模型采用哪种混色方式？","a":["相加混色","相减混色","索引混色","灰度映射"],"c":[0],"answers":[],"p":"RGB 是光色模型，采用相加混色。"},{"uid":"MM-054","origId":54,"course":"多媒体技术","src":"笔记补充","chap":"第三章 色彩","type":"s","diff":2,"q":"理论上包含人眼可见所有色彩，且与光线、设备无关的颜色模型是？","a":["RGB","CMYK","Lab","HSB"],"c":[2],"answers":[],"p":"Lab 模型基于人对颜色的感觉设计，并且与设备无关。"},{"uid":"MM-055","origId":55,"course":"多媒体技术","src":"笔记补充","chap":"第三章 数据压缩编码算法","type":"m","diff":2,"q":"数据压缩的可能性来自哪些冗余？","a":["统计冗余","编码冗余","结构冗余","视觉或听觉冗余"],"c":[0,1,2,3],"answers":[],"p":"笔记列出统计冗余、信息熵冗余、结构冗余、知识结构冗余和视觉/听觉冗余等。"},{"uid":"MM-056","origId":56,"course":"多媒体技术","src":"笔记补充","chap":"第三章 数据压缩编码算法","type":"s","diff":1,"q":"行程编码（游程编码）的基本原理是？","a":["把连续相同的数据用重复次数和数据值表示","把每个符号映射为固定长度码","把整个消息映射为小数区间","把颜色转换为YUV"],"c":[0],"answers":[],"p":"RLE 将连续相同数据序列用重复次数和单个数据表示。"},{"uid":"MM-057","origId":57,"course":"多媒体技术","src":"笔记补充","chap":"第三章 图像文件格式","type":"s","diff":2,"q":"JPEG2000相比传统JPEG的一个重要变化是？","a":["改用离散小波变换DWT并支持渐进式传输","完全不支持有损压缩","只能一行行下载","不支持图像压缩"],"c":[0],"answers":[],"p":"JPEG2000 放弃 JPEG 的 DCT，改用 DWT 和 EBCOT，并支持渐进式传输。"},{"uid":"MM-058","origId":58,"course":"多媒体技术","src":"笔记补充","chap":"第三章 MPEG","type":"s","diff":2,"q":"MPEG中I帧编码的特点是？","a":["只减少空间冗余，不参考其他图像","只减少时间冗余","一定参考前后帧","压缩率最高且画质最低"],"c":[0],"answers":[],"p":"I 帧为帧内编码，不参考其他图像，只减少空间冗余，压缩率最低但画质最高。"},{"uid":"MM-059","origId":59,"course":"多媒体技术","src":"笔记补充","chap":"第三章 MPEG","type":"s","diff":2,"q":"MPEG帧内编码中，一个宏块通常由几个块组成？","a":["2个：1个Y和1个Cr","4个：全部为亮度块","6个：4个Y块、1个Cb块、1个Cr块","8个：全部为色度块"],"c":[2],"answers":[],"p":"一个宏块由 6 个块组成：4 个亮度 Y 块、1 个 Cb 块、1 个 Cr 块。"},{"uid":"MM-060","origId":60,"course":"多媒体技术","src":"笔记补充","chap":"第三章 MPEG","type":"s","diff":3,"q":"DCT和量化之后，大多数AC值会变为0。为了获得更好的压缩比，常用的处理是？","a":["Zig-Zag扫描后进行RLE","直接转为CMYK","使用麦克风采样","改成BMP文件头"],"c":[0],"answers":[],"p":"Zig-Zag 扫描可以把更多零集中到一起，再通过 RLE 获得更高压缩比。"},{"uid":"OS-001","origId":1,"course":"操作系统","src":"课堂小测PDF","chap":"第一章 操作系统概述","type":"s","diff":1,"q":"完整的计算机系统包括","a":["主机和外设","硬件系统和软件系统","输入设备和输出设备","系统软件和应用程序"],"c":[1],"answers":[],"p":"完整的计算机系统由硬件系统和软件系统两部分组成。"},{"uid":"OS-002","origId":2,"course":"操作系统","src":"课堂小测PDF","chap":"第一章 操作系统概述","type":"m","diff":1,"q":"操作系统的功能包括","a":["文件管理","设备管理","处理器管理","存储管理"],"c":[0,1,2,3],"answers":[],"p":"操作系统的基本功能包括处理器管理、存储管理、设备管理和文件管理。"},{"uid":"OS-003","origId":3,"course":"操作系统","src":"课堂小测PDF","chap":"第一章 操作系统概述","type":"m","diff":1,"q":"以下属于操作系统的是：","a":["MS-Windows","SQL Server","MS-OFFICE","Android","Linux","Novell NetWare"],"c":[0,3,4,5],"answers":[],"p":"MS-Windows、Android、Linux、Novell NetWare 属于操作系统；SQL Server 是数据库系统，MS-OFFICE 是应用软件。"},{"uid":"OS-004","origId":4,"course":"操作系统","src":"课堂小测PDF","chap":"第一章 操作系统概述","type":"s","diff":1,"q":"软件系统中不包括","a":["操作系统","用户数据","语言处理程序","应用程序"],"c":[1],"answers":[],"p":"用户数据不是软件系统的组成部分。"},{"uid":"OS-005","origId":5,"course":"操作系统","src":"课堂小测PDF","chap":"第一章 操作系统概述","type":"m","diff":1,"q const alpha='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
const LS_H='H_MEDINFO_FINAL_', LS_W='W_MEDINFO_FINAL_';
let user='', rt={idx:0,pool:[],answers:{},drafts:{},selectedMode:'standard',selectedCourse:'全部课程',lastRec:null};
function esc(s){return String(s).replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]})}
function same(a,b){a=[...a].sort((x,y)=>x-y);b=[...b].sort((x,y)=>x-y);return a.length===b.length&&a.every((v,i)=>v===b[i])}
function ansChoice(a){return !a||!a.length?'未作答':[...a].sort((x,y)=>x-y).map(i=>alpha[i]).join('、')}
function ansFill(a){return !a||!a.length?'未作答':a.map((x,i)=>(i+1)+'. '+(x||'未填')).join('；')}
function correctFill(q){return q.answers.map((x,i)=>(q.answers.length>1?(i+1)+'. ':'')+x).join('；')}
function courseClass(c){return c==='多媒体技术'?'course-mm':(c==='操作系统'?'course-os':'course-tcm')}
function norm(s){return String(s||'').toLowerCase().replace(/[\s　，,。；;：:、（）()\[\]【】]/g,'').replace(/[－–—]/g,'-').replace(/[×＊*]/g,'x')}
function variants(a){let out=[a];let noParen=String(a).replace(/[（(][^）)]*[）)]/g,'').trim();if(noParen)out.push(noParen);String(a).split(/或|\/|；|;|，|,/).forEach(x=>{x=x.replace(/也称为|也称|也/g,'').replace(/[（）()]/g,'').trim();if(x)out.push(x)});return [...new Set(out)]}
function fillOneOk(u,a){let n=norm(u);return !!n&&variants(a).some(v=>norm(v)===n)}
function renderHome(){let courses=['全部课程','多媒体技术','操作系统','中医工程学导论'],el=document.getElementById('home-subjects');if(!el)return;el.innerHTML=courses.map(c=>{let p=c==='全部课程'?DB:DB.filter(q=>q.course===c),choice=p.filter(q=>q.type!=='f').length,fill=p.filter(q=>q.type==='f').length,sub=c==='全部课程'?p.length+' 题':(fill?fill+' 填空':choice+' 选择');return '<button class="home-course '+(rt.selectedCourse===c?'active':'')+'" onclick="setHomeCourse(\''+c+'\')"><b>'+esc(c)+'</b><span>'+sub+'</span></button>'}).join('')}function setHomeCourse(c){rt.selectedCourse=c;renderHome()}
renderHome();
window.onkeydown=e=>{if(e.key==='Enter'&&document.getElementById('page-quiz').classList.contains('active'))nextQ()};
function doLogin(){user=document.getElementById('user-input').value.trim();if(!user)return;document.getElementById('u-tag').innerText='昵称 '+user;document.getElementById('main-nav').style.display='flex';renderCourseChips();goPrepare('normal')}
function switchPage(pid){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById('page-'+pid).classList.add('active');let nid='nav-'+((pid==='quiz'||pid==='prepare')?'prepare':(pid==='snap'?'history':pid));if(document.getElementById(nid))document.getElementById(nid).classList.add('active');if(pid==='history')renderHist();if(pid==='wrong')renderWrongs();if(pid==='login')renderHome();scrollTo(0,0)}function goHome(){renderHome();switchPage('login')}
function renderCourseChips(){let cs=['全部课程','多媒体技术','操作系统','中医工程学导论'];document.getElementById('course-chips').innerHTML=cs.map(c=>'<button class="chip '+(rt.selectedCourse===c?'active':'')+'" onclick="setCourse(\''+c+'\')">'+c+'</button>').join('')}
function setCourse(c){rt.selectedCourse=c;renderCourseChips();renderHome();updatePrepView()}
function selectInitialMode(m){rt.selectedMode=m;document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('active'));let card=document.querySelector('.mode-card[onclick*="'+m+'"]');if(card)card.classList.add('active');updatePrepView()}
function goPrepare(m){if(m==='normal'){document.getElementById('mode-selector').style.display='grid'}else{document.getElementById('mode-selector').style.display='none';rt.selectedMode=m}renderCourseChips();updatePrepView();switchPage('prepare')}
function pool(){let p=[...DB];if(rt.selectedMode.startsWith('w_')){let w=JSON.parse(localStorage.getItem(LS_W+user)||'{}'),ids=Object.keys(w);p=DB.filter(q=>ids.includes(q.uid))}else if(rt.selectedCourse!=='全部课程'){p=p.filter(q=>q.course===rt.selectedCourse)}if(rt.selectedMode==='hard'||rt.selectedMode==='w_freq'){let n=rt.selectedMode==='hard'?(parseInt(document.getElementById('hard-num')&&document.getElementById('hard-num').value)||30):p.length;p=p.sort((a,b)=>b.diff-a.diff||a.uid.localeCompare(b.uid)).slice(0,n)}return p}
function updatePrepView(){let names={standard:'标准',random:'随机',hard:'重点',w_order:'错题',w_rand:'错题',w_freq:'难点'},p=pool();document.getElementById('prep-mode-name').innerText=names[rt.selectedMode]||'-';document.getElementById('prep-count').innerText=p.length;document.getElementById('prep-choice-count').innerText=p.filter(q=>q.type!=='f').length;document.getElementById('prep-fill-count').innerText=p.filter(q=>q.type==='f').length;document.getElementById('hard-config').style.display=rt.selectedMode==='hard'?'block':'none'}
function realStart(){rt.pool=pool();if(!rt.pool.length)return alert('暂无可练题目。');if(rt.selectedMode==='random'||rt.selectedMode==='w_rand')rt.pool=rt.pool.sort(()=>Math.random()-.5);rt.idx=0;rt.answers={};rt.drafts={};document.getElementById('progress-panel').style.display='none';renderQ();switchPage('quiz')}
function unanswered(){return rt.pool.filter(q=>!rt.answers[q.uid]).length}function trace(){return rt.pool.map(q=>rt.answers[q.uid]||{qid:q.uid,u:[],ok:false,skipped:true})}
function toggleProgressPanel(){let p=document.getElementById('progress-panel');p.style.display=p.style.display==='block'?'none':'block';renderProgress()}
function renderProgress(){let p=document.getElementById('progress-panel'),u=unanswered();p.innerHTML='<div class="phead"><span>作答情况</span><span>已答 '+(rt.pool.length-u)+' / '+rt.pool.length+'，未答 '+u+'</span></div><div class="pgrid">'+rt.pool.map((q,i)=>{let a=rt.answers[q.uid],cls=a?(a.ok?'done':'wrong'):'todo';if(i===rt.idx)cls+=' current';return '<button class="pitem '+cls+'" onclick="jumpToQuestion('+i+')">'+(i+1)+'</button>'}).join('')+'</div>'}
window.jumpToQuestion=i=>{rt.idx=i;renderQ()};
function answerCurrent(sel){let q=rt.pool[rt.idx];if(rt.answers[q.uid])return;let u=[...sel].map(Number).sort((a,b)=>a-b),ok=same(u,q.c),item={ok,qid:q.uid,u,skipped:false};rt.answers[q.uid]=item;delete rt.drafts[q.uid];if(!ok)saveWrong(item);renderQ()}
function toggleDraft(i){let q=rt.pool[rt.idx];if(rt.answers[q.uid])return;let d=rt.drafts[q.uid]||[];rt.drafts[q.uid]=d.includes(i)?d.filter(v=>v!==i):[...d,i].sort((a,b)=>a-b);renderQ()}function submitMulti(){let q=rt.pool[rt.idx],d=rt.drafts[q.uid]||[];if(!d.length)return alert('请至少选择一个选项。');answerCurrent(d)}
function submitFill(){let q=rt.pool[rt.idx];if(rt.answers[q.uid])return;let vals=q.answers.map((_,i)=>document.getElementById('fill-'+i).value.trim());if(vals.every(v=>!v))return alert('请至少填写一个空。');let ok=q.answers.every((a,i)=>fillOneOk(vals[i],a));let item={ok,qid:q.uid,u:vals,skipped:false};rt.answers[q.uid]=item;if(!ok)saveWrong(item);renderQ()}
function renderQ(){document.getElementById('ana-area').style.display='none';document.getElementById('opt-box').style.display='grid';document.getElementById('fill-box').style.display='none';let q=rt.pool[rt.idx],ex=rt.answers[q.uid],d=rt.drafts[q.uid]||[];document.getElementById('tag-container').innerHTML='<span class="tag '+courseClass(q.course)+'">'+esc(q.course)+'</span><span class="tag">'+esc(q.chap)+'</span><span class="tag src">'+esc(q.src)+'</span><span class="tag type">'+(q.type==='m'?'多选题':(q.type==='f'?'填空题':'单选题'))+'</span>';document.getElementById('q-meta-idx').innerText=(rt.idx+1)+' / '+rt.pool.length+'  # '+q.uid;document.getElementById('q-text').innerHTML=esc(q.q);let box=document.getElementById('opt-box');box.innerHTML='';document.getElementById('multi-submit').style.display='none';if(q.type==='f'){box.style.display='none';renderFill(q,ex)}else{q.a.forEach((t,i)=>{let selected=ex?ex.u.includes(i):d.includes(i),cls='opt';if(!ex&&selected)cls+=' sel';if(ex&&q.c.includes(i))cls+=' correct';if(ex&&selected&&!q.c.includes(i))cls+=' wrong';let div=document.createElement('div');div.className=cls;div.innerHTML='<span class="idx">'+alpha[i]+'</span><span>'+esc(t)+'</span>';div.onclick=()=>q.type==='m'?toggleDraft(i):answerCurrent([i]);box.appendChild(div)});document.getElementById('multi-submit').style.display=(!ex&&q.type==='m')?'flex':'none';if(ex){document.getElementById('ana-cont').innerHTML='<b>'+(ex.ok?'回答正确':'正确答案：'+ansChoice(q.c))+'</b><br>'+esc(q.p);document.getElementById('ana-area').style.display='block'}}renderProgress()}
function renderFill(q,ex){let fb=document.getElementById('fill-box'),grid=document.getElementById('fill-grid'),state=document.getElementById('fill-state');fb.style.display='block';grid.innerHTML=q.answers.map((_,i)=>'<div class="fill-item"><label>第 '+(i+1)+' 空</label><input id="fill-'+i+'" '+(ex?'disabled':'')+' value="'+esc(ex&&ex.u?ex.u[i]||'':'')+'" placeholder="输入答案"></div>').join('');document.getElementById('fill-submit').style.display=ex?'none':'flex';if(ex){state.innerHTML=q.answers.map((a,i)=>{let ok=fillOneOk(ex.u[i],a);return '<div class="fill-row '+(ok?'ok':'bad')+'"><b>第 '+(i+1)+' 空：</b>你的答案：'+esc(ex.u[i]||'未填')+'；正确答案：'+esc(a)+'</div>'}).join('');document.getElementById('ana-cont').innerHTML='<b>'+(ex.ok?'回答正确':'正确答案：'+esc(correctFill(q)))+'</b><br>'+esc(q.p);document.getElementById('ana-area').style.display='block'}else{state.innerHTML=''}}
function nextQ(){if(rt.idx<rt.pool.length-1){rt.idx++;renderQ()}else submitPaper()}function submitPaper(){let u=unanswered(),msg=u>0?'当前还有 '+u+' 题未作答，确认提前交卷吗？':'已完成全部题目，确认提交试卷吗？';if(confirm(msg))finish()}
function finish(){let tr=trace(),correct=tr.filter(t=>t.ok).length,score=Math.round(correct/rt.pool.length*100);document.getElementById('res-score').innerText=score;rt.lastRec={time:new Date().toLocaleString(),score,correct,total:rt.pool.length,trace:tr,isWrongMode:rt.selectedMode.startsWith('w_')};if(!rt.lastRec.isWrongMode){let h=JSON.parse(localStorage.getItem(LS_H+user)||'[]');h.unshift(rt.lastRec);localStorage.setItem(LS_H+user,JSON.stringify(h.slice(0,10)))}switchPage('result')}
function optHtml(q,t){let u=t.u||[];return q.a.map((o,i)=>'<div class="opt '+(q.c.includes(i)?'correct ':'')+(u.includes(i)&&!q.c.includes(i)?'wrong':'')+'" style="padding:10px;min-height:48px;font-size:14px;cursor:default"><span class="idx" style="width:24px;height:24px">'+alpha[i]+'</span><span>'+esc(o)+'</span></div>').join('')}
function fillSnapHtml(q,t){let u=t.u||[];return '<div class="fill-state">'+q.answers.map((a,i)=>{let ok=!t.skipped&&fillOneOk(u[i],a);return '<div class="fill-row '+(ok?'ok':(!t.skipped?'bad':''))+'"><b>第 '+(i+1)+' 空：</b>你的答案：'+esc(t.skipped?'未作答':(u[i]||'未填'))+'；正确答案：'+esc(a)+'</div>'}).join('')+'</div>'}
function showSnap(rec=null,showFooter=false,fromPage='history'){let data=rec||rt.lastRec,list=document.getElementById('snap-list');list.innerHTML='<h3 style="text-align:center;color:var(--g)">题目详情回顾</h3>';data.trace.forEach(t=>{let q=DB.find(x=>x.uid===t.qid);if(!q)return;let div=document.createElement('div'),st=t.skipped?'未作答':(t.ok?'答对':'答错'),color=t.skipped?'var(--c2)':(t.ok?'var(--ok)':'var(--er)');let body=q.type==='f'?fillSnapHtml(q,t):('<div class="opts">'+optHtml(q,t)+'</div>');let detail=q.type==='f'?'':('<div class="ana">'+(t.skipped?'<b>本题未作答</b><br>':'<b>你的答案：'+ansChoice(t.u)+'</b><br>')+'解析：'+esc(q.p)+'</div>');div.className='snap-item';div.innerHTML='<div style="color:'+color+';font-weight:bold">题目编号 #'+q.uid+' - ['+esc(q.course)+' / '+esc(q.chap)+'] | '+st+'</div><div class="qtext" style="font-size:18px;margin:10px 0">'+esc(q.q)+'</div>'+body+detail;list.appendChild(div)});document.getElementById('snap-back-btn').innerText=fromPage==='wrong'?'返回错题列表':'返回历史记录';document.getElementById('snap-back-btn').onclick=()=>switchPage(fromPage);switchPage('snap')}
function toggleScoreChart(){let p=document.getElementById('score-chart');p.style.display=p.style.display==='block'?'none':'block';if(p.style.display==='block')renderScoreChart()}function renderScoreChart(){let p=document.getElementById('score-chart'),h=JSON.parse(localStorage.getItem(LS_H+user)||'[]');if(h.length<=2){p.style.display='none';return}let pts=[...h].reverse(),w=760,hh=260,l=45,r=20,t=20,b=40,iw=w-l-r,ih=hh-t-b,step=pts.length>1?iw/(pts.length-1):iw,poly=pts.map((it,i)=>{let x=l+step*i,y=t+ih-(it.score/100)*ih;return x+','+y}).join(' '),dots=pts.map((it,i)=>{let x=l+step*i,y=t+ih-(it.score/100)*ih;return '<circle class="dot" cx="'+x+'" cy="'+y+'" r="4"></circle><text class="lab" x="'+x+'" y="'+(y-10)+'" text-anchor="middle">'+it.score+'</text><text class="lab" x="'+x+'" y="'+(hh-12)+'" text-anchor="middle">'+(i+1)+'</text>'}).join(''),ys=[0,20,40,60,80,100].map(s=>{let y=t+ih-(s/100)*ih;return '<text class="lab" x="8" y="'+(y+4)+'">'+s+'</text><line class="axis" x1="'+l+'" y1="'+y+'" x2="'+(w-r)+'" y2="'+y+'"></line>'}).join('');p.innerHTML='<h3>成绩曲线</h3><svg viewBox="0 0 '+w+' '+hh+'" preserveAspectRatio="none">'+ys+'<line class="axis" x1="'+l+'" y1="'+(hh-b)+'" x2="'+(w-r)+'" y2="'+(hh-b)+'"></line><polyline class="line" points="'+poly+'"></polyline>'+dots+'</svg><div style="margin-top:8px;color:var(--c2);font-size:13px">横轴为测试次数，纵轴为分数。</div>'}
function renderHist(){let h=JSON.parse(localStorage.getItem(LS_H+user)||'[]'),btn=document.getElementById('score-chart-btn'),chart=document.getElementById('score-chart');btn.style.display=h.length>2?'inline-block':'none';if(h.length<=2)chart.style.display='none';document.getElementById('hist-list').innerHTML=h.map((it,i)=>'<div class="item" onclick="viewHist('+i+')"><b>'+esc(it.time)+'</b><span style="float:right;color:var(--g);font-weight:bold">'+it.score+'分</span><br><span style="color:var(--c2)">答对 '+it.correct+' / '+it.total+'</span></div>').join('')||'<div style="text-align:center;color:var(--c2);padding:45px">暂无历史记录</div>';if(chart.style.display==='block'&&h.length>2)renderScoreChart()}window.viewHist=i=>{let h=JSON.parse(localStorage.getItem(LS_H+user)||'[]');showSnap(h[i],true,'history')};
function renderWrongs(){let w=JSON.parse(localStorage.getItem(LS_W+user)||'{}'),ids=Object.keys(w).sort(),groups={},ct=document.getElementById('w-content');ids.forEach(id=>{let q=DB.find(x=>x.uid===id);if(q)(groups[q.course+' · '+q.chap]||(groups[q.course+' · '+q.chap]=[])).push(q)});ct.innerHTML='';if(!ids.length){ct.innerHTML='<div style="text-align:center;padding:50px;color:var(--c2)">目前没有错题记录。</div>';return}Object.entries(groups).forEach(([name,items])=>{let sec=document.createElement('div');sec.innerHTML='<div class="cat"><span>'+esc(name)+'</span><span style="font-size:12px;opacity:.72">'+items.length+' 题</span></div>';items.forEach(q=>{let c=document.createElement('div');c.className='item';c.onclick=()=>viewWrongSnap(q.uid);c.innerHTML='<button class="del" onclick="removeWrong(\''+q.uid+'\',event)">移除</button><b>#'+q.uid+'</b> '+esc(q.q);sec.appendChild(c)});ct.appendChild(sec)})}
window.viewWrongSnap=id=>{let w=JSON.parse(localStorage.getItem(LS_W+user)||'{}');showSnap({trace:[w[id]],isWrongMode:true},true,'wrong')};function removeWrong(id,e){e.stopPropagation();let w=JSON.parse(localStorage.getItem(LS_W+user)||'{}');delete w[id];localStorage.setItem(LS_W+user,JSON.stringify(w));renderWrongs()}function saveWrong(t){let w=JSON.parse(localStorage.getItem(LS_W+user)||'{}');w[t.qid]=t;localStorage.setItem(LS_W+user,JSON.stringify(w))}
</script>
